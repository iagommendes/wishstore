name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Theme Check
        uses: shopify/theme-check-action@v2
        with:
          theme_root: .
          # Avoid GitHub Checks API when token lacks checks:write in some contexts
          token: ${{ secrets.GITHUB_TOKEN }}

  # Optional: only runs when Shopify store secrets are configured for this fork
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_LIGHTHOUSE == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - name: Lighthouse
        uses: shopify/lighthouse-ci-action@v1
        with:
          store: ${{ secrets.SHOP_STORE }}
          password: ${{ secrets.SHOP_PASSWORD }}
          access_token: ${{ secrets.SHOP_ACCESS_TOKEN }}
          collection_handle: all
          theme_root: .
          lhci_min_score_performance: 0.6
          lhci_min_score_accessibility: 0.9
